                    <div id="input-div" class="input-div">
                        <label for="search"><i class="ri-search-line"></i></label>
                        <input type="search" name="search" placeholder="Job Title or Keyword">
                    </div>
                    <div id="input-div" class="input-div submit">
                        <label for="search"><i class="ri-map-pin-line"></i></label>
                        <select name="map" id="map">
                            <option value="">Mapulo, Matola</option>
                            <option value="">Mapulo, Cidade de Maputo</option>
                        </select>

                        <button type="submit">Search</button>
                    </div>
                </div>
                <p>Popular: UI Designer, UX Researcher, Android, Admin</p>
            </div>
        </section>
    </main>
